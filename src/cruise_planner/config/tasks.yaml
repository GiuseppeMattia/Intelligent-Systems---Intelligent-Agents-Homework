plan_cruise_task:
  description: >
    Create a detailed plan for a cruise with the following theme: {topic}.
    As the Director, you must delegate the research to your three experts (places, food, and activities).
    Ensure the plan includes:
    - The stops and places to visit each day.
    - The recommended dining options on board for breakfast, lunch, and dinner.
    - The entertainment and activities available for passengers on the ship.
  expected_output: >
    A comprehensive and exciting Markdown document describing the day-by-day travel plan, combining destinations, food, and activities into a unique experience.
#  agent: cruise_manager

