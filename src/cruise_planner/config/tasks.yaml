places_task:
  description: >
    Create an itinerary for a {topic}.
    List the ports of call, the cities, and the excursions for each day.
    Be very essential. Use maximum 250 words in total.
  expected_output: >
    A detailed but concise day-by-day list of destinations.
  agent: places_expert

food_task:
  description: >
    Create a dining plan for a {topic}.
    Recommend dining options on board for breakfast, lunch, and dinner, including themed restaurants.
    Be very essential. Use maximum 250 words in total.
  expected_output: >
    A very concise list of daily culinary experiences and restaurant recommendations.
  agent: food_expert

activities_task:
  description: >
    Plan the entertainment and wellness activities for a {topic}.
    Include shows, pools, nightlife, and spa treatments.
    Be very essential. Use maximum 250 words in total.
  expected_output: >
    A very concise schedule of entertainment and activities.
  agent: activities_expert

plan_cruise_task:
  description: >
    You are the General Cruise Director. You have just received three separate reports from your experts:
    1. The destinations report.
    2. The food and dining report.
    3. The activities and entertainment report.
    Your task is to take these three reports and cleverly merge them into ONE single, cohesive, and luxurious plan for a {topic}.

    CRITICAL FORMATTING RULES:
    You MUST group all information (places, food, activities) BY DAY. 
    Do NOT create separate mega-sections for food or activities at the end of the document.
    You MUST use the exact following Markdown template for each of the 7 days:

    ## Day [Number]: [Destination Name]
    * **Excursions:** [Brief summary of the day's port and excursions]
    * **Dining:** [Brief summary of Breakfast, Lunch, and Dinner]
    * **Onboard Activities:** [Brief summary of entertainment, shows, and wellness]
    
    Repeat this exact structure for Day 1 to Day 7. Be very essential. Do not exceed 500 words in total.
  expected_output: >
    The final, beautiful, comprehensive and really concise {topic} plan in a well-formatted Markdown document and fully completed without text truncation.
  agent: cruise_manager
  markdown: true
  context: [places_task, food_task, activities_task]

simulate_feedback_task:
  description: >
    Review the final cruise itinerary generated by the team.
    Be essential. Don't add useless information. Write many but concise reviews. Don't exceed 600 words.
  expected_output: >
    A Markdown document containing the simulated tourist reviews.
  agent: tourist_simulator
  markdown: true
  context: [plan_cruise_task]

improvement_report_task:
  description: >
    Analyze the simulated tourist reviews provided by the Tourist Simulator.
    Identify any complaints, constructive criticisms, or areas for improvement regarding the cruise itinerary, food, or activities.
    Draft a clear, actionable, but essential report detailing exactly what the cruise director and the experts need to change to fix these issues.
    Write at maximum 350 words.
  expected_output: >
    A Markdown document that lists the identified issues and provides concrete, practical recommendations for each.
  agent: improvement_analyst
  markdown: true
  context: [simulate_feedback_task]

refine_cruise_plan_task:
  description: >
    Rewrite the initial itinerary to address the complaints from the improvement report.
    The goal is to produce a flawless, 5-star travel plan that perfectly aligns with the theme: {topic}.
    CRITICAL WRITING AND FORMATTING RULES:
    1. Integrate the improvements SEAMLESSLY and NATURALLY into the text.
    2. DO NOT use meta-phrasing like "now upgraded to", "now featuring", "updated", or "changed". Write the text as if it has always been the original, perfect version.
    3. Maintain an elegant, highly readable, and luxurious tone.
    4. Do not add a concluding summary explaining what you changed. Just deliver the final itinerary.
    5. The total output must not exceed 500 words. Be essential but engaging.
  expected_output: >
    A beautiful, natural-sounding, and seamlessly integrated final cruise itinerary in Markdown. No meta-commentary about the changes made.
  agent: cruise_manager
  context: [plan_cruise_task, improvement_report_task]